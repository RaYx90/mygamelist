services:
  translate:
    image: libretranslate/libretranslate
    container_name: gamelist-translate
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: "800M"
    environment:
      LT_LOAD_ONLY: "en,es"
      LT_DISABLE_WEB_UI: "true"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/languages')\" 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 180s
    restart: always

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gamelist-web
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "256M"
    ports:
      - "1080:1080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:1080"
      ConnectionStrings__DefaultConnection: "${CONNECTION_STRING}"
      Igdb__ClientId: "${IGDB_CLIENT_ID}"
      Igdb__ClientSecret: "${IGDB_CLIENT_SECRET}"
      Registration__SecretCode: "${REGISTRATION_SECRET_CODE}"
      LibreTranslate__ApiUrl: "http://translate:5000"
    volumes:
      - dataprotection_keys:/app/dataprotection-keys
      - avatars:/app/uploads/avatars
    depends_on:
      translate:
        condition: service_healthy
    networks:
      - default
      - postgres
      - caddy
    restart: always

volumes:
  dataprotection_keys:
    driver: local
  avatars:
    driver: local

networks:
  postgres:
    external: true
  caddy:
    external: true
